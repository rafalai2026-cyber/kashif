
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاشف - فحص الروابط المشبوهة</title>
    <style>
        body {font-family: Arial; background: #0f172a; color: white; text-align: center; padding: 20px; margin: 0;}
        .container {max-width: 500px; margin: 50px auto; background: #1e293b; padding: 30px; border-radius: 15px;}
        h1 {color: #3b82f6; margin-bottom: 10px;}
        input {width: 90%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; font-size: 16px; text-align: left; direction: ltr;}
        button {background: #3b82f6; color: white; padding: 12px 25px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; width: 95%;}
        button:hover {background: #2563eb;}
        #result {margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: bold; display: none;}
        .danger {background: #ef4444; display: block;}
        .safe {background: #22c55e; display: block;}
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 كاشف</h1>
        <p>افحص اي رابط قبل لا تدوس عليه</p>
        <input type="text" id="urlInput" placeholder="الصق الرابط هنا...">
        <br>
        <button onclick="checkLink()">فحص الرابط</button>
        <div id="result"></div>
    </div>

    <script>
        function checkLink() {
            const link = document.getElementById('urlInput').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!link) {
                resultDiv.className = 'danger';
                resultDiv.innerHTML = 'اكتب رابط اول ⚠️';
                resultDiv.style.display = 'block';
                return;
            }

            const badWords = ['.tk', '.ml', '.ga', '.cf', 'bit.ly', 'tinyurl', 'paypal-', 'security-update', 'login-', 'verify-account', 'free-', 'prize', 'gift'];
            let isBad = badWords.some(word => link.toLowerCase().includes(word));

            if (isBad) {
                resultDiv.className = 'danger';
                resultDiv.innerHTML = 'رابط مشبوه ⚠️ لا تفتحه! هذا الرابط ممكن يكون احتيال';
            } else {
                resultDiv.className = 'safe';
                resultDiv.innerHTML = 'رابط آمن ✅ شكله طبيعي';
            }
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
